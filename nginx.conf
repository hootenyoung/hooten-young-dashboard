# Nginx config for the hooten-young-dashboard SPA on Cloud Run.
#
# Listens on 8080 (Cloud Run default). All non-asset paths fall back
# to /index.html so React Router can take over the route.
#
# Static assets get long-lived cache headers because Vite emits
# content-hashed filenames (e.g. index-D4f4eGpN.js).

server {
  listen 8080 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed asset files.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Everything else: try the file, then directory, then SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Don't serve hidden files (e.g. .env if it sneaks in).
  location ~ /\. {
    deny all;
  }

  # Tiny health endpoint for Cloud Run readiness probes.
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
